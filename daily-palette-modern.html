<!-- 现代化每日配色推荐模块 -->
<style>
/* 现代卡片设计 */
.daily-palette-modern {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
    position: relative;
    margin-bottom: 40px;
}

.daily-palette-modern::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* 头部区域 */
.daily-palette-header {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    position: relative;
    z-index: 1;
}

.daily-palette-badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 15px;
}

.daily-palette-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: white;
    margin: 0;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

.daily-palette-date {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.8);
    margin-top: 10px;
    font-weight: 500;
}

/* 内容区域 */
.daily-palette-body {
    padding: 40px;
    background: white;
    position: relative;
    z-index: 1;
}

.daily-palette-description {
    font-size: 1.1rem;
    color: #666;
    line-height: 1.8;
    margin-bottom: 30px;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-radius: 16px;
    border-left: 4px solid #667eea;
}

/* 颜色网格 */
.daily-palette-colors {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.daily-color-block {
    position: relative;
    aspect-ratio: 1;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    overflow: hidden;
}

.daily-color-block:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
}

.daily-color-block::after {
    content: '点击复制';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    font-size: 0.75rem;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
}

.daily-color-block:hover::after {
    opacity: 1;
}

.daily-color-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
}

.daily-color-hex {
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    margin-bottom: 5px;
}

.daily-color-name {
    font-size: 0.85rem;
    opacity: 0.9;
}

/* 使用建议 */
.daily-palette-usage {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 30px;
}

.usage-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
    border-radius: 12px;
    transition: all 0.3s;
}

.usage-item:hover {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    transform: translateX(5px);
}

.usage-icon {
    font-size: 1.5rem;
}

.usage-text {
    font-size: 0.95rem;
    font-weight: 500;
}

/* 操作按钮 */
.daily-palette-actions {
    display: flex;
    gap: 15px;
    margin-top: 30px;
}

.action-btn {
    flex: 1;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.action-btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.action-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.action-btn-secondary {
    background: white;
    color: #667eea;
    border: 2px solid #667eea;
}

.action-btn-secondary:hover {
    background: #667eea;
    color: white;
}

/* 响应式设计 */
@media (max-width: 768px) {
    .daily-palette-modern {
        border-radius: 20px;
    }

    .daily-palette-header {
        padding: 20px;
    }

    .daily-palette-title {
        font-size: 1.8rem;
    }

    .daily-palette-body {
        padding: 20px;
    }

    .daily-palette-description {
        font-size: 1rem;
        padding: 15px;
    }

    .daily-palette-colors {
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .daily-palette-usage {
        grid-template-columns: 1fr;
    }

    .daily-palette-actions {
        flex-direction: column;
    }
}
</style>
